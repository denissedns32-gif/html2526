<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Address</h1>
    <h2>Shipping Information</h2>
    <form>
        <label>First Name:</label>
        <input type="text" name="firstName">
        <br>
   
        <label>Last Name:</label>
        <input type="text" name="lastName">     
        <br>
  
        <label>Address:</label>
        <input type="text" name="address">
        <br>
 
        <label>Apartament, suite, etc.:</label>
        <input type="text" name="apartment, suite, etc.">
 
    <div>
    <label for="country">Country:</label> 
    <select name="country" id="country">
        <option value="Selecteza tara"></option>
        <option value="romania">Romania</option>
        <option value="italy">Italy</option>
        <option value="germany">Germany</option>
    </select>

    <label for="city">City</label> 
    <select name="city" id="city">
        <option value="Selecteza oras"></option>
        <option value="bucharest">Bucharest</option>
        <option value="rome">Rome</option>
        <option value="berlin">Berlin</option>
    </select>
   
    <label for="zipcode">Zip Code:</label> 
    <input type="text" name="zipcode" id="zipcode">
      </select>
       <br>
        <div>
        <input type="checkbox" name="save contact information" id="saveContactInformation">
        <label for="saveContactInformation">Save contact information</label>
        </div>

       <section>
            <h3>Payment Information</h3>
    
        <button type="button" style="width: 50px; height: 25px;">
            <img src="https://cdn-icons-png.flaticon.com/128/888/888870.png" alt="button" style="width: 100%; height: 100%; object-fit: contain;">
        </button> 
         
        <button type="button" style="width: 50px; height: 25px;">Cash</button>
            

        <br>
        <label>Cardholder Name:</label>
        <input type="text" name="cardholderName">
          <br>
    
                <label for="Card Number">Card Number:</label>
                <input type="text" name="CardNumber" id="Card Number">
        <br>
    <label for="month">Month:</label> 
    <select name="month" id="month">
        <option value="Selecteza luna"></option>
        <option value="january">January</option>
        <option value="february">February</option>
        <option value="march">March</option>
    </select>


    <label for="year">Year:</label> 
    <select name="year" id="year">
        <option value="Selecteza an"></option>
        <option value="2023">2023</option>
        <option value="2024">2024</option>
        <option value="2025">2025</option>
    </select>
      <input type="CVC" name="CVC" id="CVC" placeholder="CVC">
     <br>
        <input type="checkbox" name="save card data for future payments" id="saveCardData">
        <label for="saveCardData">Save card data for future payments</label>
    
           <br>
        <button type="button"><span>Pay with card</span>
        </button>
       </section>
</form>



</body>
</html>
